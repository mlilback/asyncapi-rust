# git-cliff configuration for asyncapi-rust
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog template - renders release notes from conventional commits
#
# Credit tokens recognized in commit bodies (preprocessed into trailers):
#   "Reported by @username."   → credited as "reported by @username"
#   "Contributed by @username." → credited as "contributed by @username"
# Issue references like "closes #5" or "#5" are turned into GitHub links.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits | filter(attribute="scope") | unique(attribute="message") -%}
        {%- set reporter = commit.footers | filter(attribute="token", value="Reported-by") | first %}
        {%- set contributor = commit.footers | filter(attribute="token", value="Contributed-by") | first %}
        - **{{ commit.scope }}:** {{ commit.message | upper_first }}\
        {%- if reporter %} (reported by {{ reporter.value }}\
        {%- if contributor %}, contributed by {{ contributor.value }}{%- endif %}\
        {%- if commit.links %}, {% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}{%- endif %})\
        {%- elif contributor %} (contributed by {{ contributor.value }}\
        {%- if commit.links %}, {% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}{%- endif %})\
        {%- elif commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %})\
        {%- endif %}
    {% endfor %}
    {% for commit in commits -%}
        {%- if not commit.scope -%}
        {%- set reporter = commit.footers | filter(attribute="token", value="Reported-by") | first %}
        {%- set contributor = commit.footers | filter(attribute="token", value="Contributed-by") | first %}
        - {{ commit.message | upper_first }}\
        {%- if reporter %} (reported by {{ reporter.value }}\
        {%- if contributor %}, contributed by {{ contributor.value }}{%- endif %}\
        {%- if commit.links %}, {% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}{%- endif %})\
        {%- elif contributor %} (contributed by {{ contributor.value }}\
        {%- if commit.links %}, {% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}{%- endif %})\
        {%- elif commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %})\
        {%- endif %}
        {% endif -%}
    {% endfor %}
{% endfor %}

{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ### New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in #{{ contributor.pr_number }} {%- endif %}
{% endfor %}
{% endif %}\n
"""
trim = true
footer = ""

[git]
# Parse conventional commits
conventional_commits = true
# Exclude non-conventional commits
filter_unconventional = true

# Normalize attribution lines in commit bodies into parseable trailer format.
# "Reported by @username."    → "Reported-by: @username"
# "Contributed by @username." → "Contributed-by: @username"
# These become commit.footers entries in the template.
commit_preprocessors = [
    { pattern = "Reported by (@[-\\w]+)\\.", replace = "Reported-by: $1" },
    { pattern = "Contributed by (@[-\\w]+)\\.", replace = "Contributed-by: $1" },
]

# Turn "#N" references in commit messages into GitHub issue links (commit.links).
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/mlilback/asyncapi-rust/issues/$1", text = "#$1" },
]

# Commit message parsers - assign commits to groups
commit_parsers = [
    { message = "^feat", group = "⚡ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "🚀 Performance" },
    { message = "^refactor", group = "♻️ Refactoring" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "⚙️ Miscellaneous" },
    { body = ".*security", group = "🛡️ Security" },
    { message = "^revert", skip = true },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"

[github]
owner = "mlilback"
repo = "asyncapi-rust"

[bump]
# Pre-1.0 versioning rules
# Features or breaking changes bump minor version
# Bug fixes and other changes bump patch version
features_always_bump_minor = true
breaking_always_bump_major = false

custom_bump_increment = [
    # Breaking changes bump MINOR in pre-1.0 (not MAJOR)
    { pattern = "BREAKING CHANGE:", increment = "minor" },
    { pattern = "!:", increment = "minor" },

    # Features bump MINOR
    { pattern = "^feat", increment = "minor" },

    # All others bump PATCH
    { pattern = "^fix", increment = "patch" },
    { pattern = "^docs?", increment = "patch" },
    { pattern = "^perf", increment = "patch" },
    { pattern = "^refactor", increment = "patch" },
    { pattern = "^test", increment = "patch" },
    { pattern = "^chore", increment = "patch" },
]
